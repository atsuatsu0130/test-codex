<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>顧客管理アプリ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">Customer Manager</p>
        <h1>顧客管理アプリ</h1>
        <p class="lead">顧客情報、商談状況、次回フォロー日をブラウザだけで管理できます。</p>
      </div>
      <div class="hero-card" aria-label="顧客サマリー">
        <span class="summary-number" id="totalCustomers">0</span>
        <span>登録顧客数</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel form-panel" aria-labelledby="formTitle">
        <h2 id="formTitle">顧客を登録・編集</h2>
        <form id="customerForm">
          <input type="hidden" id="customerId" />
          <label>
            会社名 / 氏名
            <input id="name" type="text" placeholder="例: 株式会社サンプル" required />
          </label>
          <label>
            担当者
            <input id="contact" type="text" placeholder="例: 山田 太郎" required />
          </label>
          <label>
            メール
            <input id="email" type="email" placeholder="example@example.com" required />
          </label>
          <label>
            電話番号
            <input id="phone" type="tel" placeholder="03-1234-5678" />
          </label>
          <label>
            ステータス
            <select id="status">
              <option value="見込み">見込み</option>
              <option value="商談中">商談中</option>
              <option value="契約済み">契約済み</option>
              <option value="休眠">休眠</option>
            </select>
          </label>
          <label>
            次回フォロー日
            <input id="followUp" type="date" />
          </label>
          <label class="wide">
            メモ
            <textarea id="notes" rows="4" placeholder="ニーズ、課題、次のアクションなど"></textarea>
          </label>
          <div class="actions wide">
            <button type="submit" class="primary">保存する</button>
            <button type="button" id="resetButton" class="secondary">入力をクリア</button>
          </div>
        </form>
      </section>

      <section class="panel list-panel" aria-labelledby="listTitle">
        <div class="list-header">
          <div>
            <h2 id="listTitle">顧客一覧</h2>
            <p id="resultCount">0件を表示中</p>
          </div>
          <input id="searchInput" type="search" placeholder="会社名・担当者・メールで検索" aria-label="顧客検索" />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>顧客</th>
                <th>連絡先</th>
                <th>ステータス</th>
                <th>次回フォロー</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="customerTable"></tbody>
          </table>
          <p id="emptyState" class="empty">まだ顧客が登録されていません。左のフォームから追加してください。</p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
