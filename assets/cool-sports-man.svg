<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">かっこいいスポーツをしている男の人</title>
  <desc id="desc">夜のスタジアムでダイナミックにジャンプしながらバスケットボールをプレーする男性のスタイライズドイラスト。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081226"/>
      <stop offset="0.45" stop-color="#10265f"/>
      <stop offset="1" stop-color="#04111f"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="16%" r="62%">
      <stop offset="0" stop-color="#76e4ff" stop-opacity="0.78"/>
      <stop offset="0.36" stop-color="#3677ff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#081226" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="court" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#163a6b"/>
      <stop offset="1" stop-color="#071321"/>
    </linearGradient>
    <linearGradient id="jersey" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.52" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7c59f"/>
      <stop offset="1" stop-color="#b96d42"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.72 0 0 0 0 1 0 0 0 .9 0" result="blueGlow"/>
      <feMerge>
        <feMergeNode in="blueGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#sky)"/>
  <rect width="1200" height="800" fill="url(#spotlight)"/>

